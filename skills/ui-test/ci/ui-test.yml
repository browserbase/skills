# .github/workflows/ui-test.yml
#
# Runs adversarial UI testing on PRs that touch frontend files.
# Requires a preview deployment (Vercel, Netlify, etc.) before testing.
#
# Secrets needed:
#   ANTHROPIC_API_KEY    — Claude API access
#   BROWSERBASE_API_KEY  — Cloud browser for remote testing
#
# Optional:
#   UI_TEST_MAX_TOKENS   — Cap total token spend per run (default: 100000)
#   UI_TEST_MODE         — "light" (fewer agents, smaller budgets) or "full" (default: light)

name: UI Test

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-flight runs for the same PR
concurrency:
  group: ui-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Gate: only run if the PR touches UI files ──────────────────────────
  check-ui-changes:
    runs-on: ubuntu-latest
    outputs:
      has_ui_changes: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ui:
              - '**/*.tsx'
              - '**/*.jsx'
              - '**/*.vue'
              - '**/*.svelte'
              - '**/*.css'
              - '**/*.scss'
              - '**/*.module.css'
              - 'app/**'
              - 'pages/**'
              - 'src/routes/**'
              - 'src/components/**'
              - 'public/**'

  # ── Wait for preview deployment ────────────────────────────────────────
  wait-for-preview:
    needs: check-ui-changes
    if: needs.check-ui-changes.outputs.has_ui_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.get-url.outputs.url }}
    steps:
      # Option A: Vercel — wait for the deployment to be ready
      - name: Wait for Vercel preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        id: vercel
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10

      - name: Set preview URL
        id: get-url
        run: echo "url=${{ steps.vercel.outputs.url }}" >> "$GITHUB_OUTPUT"

      # ─── Alternative: Netlify ───
      # - name: Wait for Netlify preview
      #   uses: jakepartusch/wait-for-netlify-action@v1.4
      #   id: netlify
      #   with:
      #     site_name: your-site-name
      #     max_timeout: 300
      #
      # - name: Set preview URL
      #   id: get-url
      #   run: echo "url=${{ steps.netlify.outputs.url }}" >> "$GITHUB_OUTPUT"

      # ─── Alternative: Custom / self-hosted ───
      # - name: Set preview URL
      #   id: get-url
      #   run: echo "url=https://pr-${{ github.event.pull_request.number }}.preview.yourapp.com" >> "$GITHUB_OUTPUT"

  # ── Run UI tests ───────────────────────────────────────────────────────
  ui-test:
    needs: wait-for-preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
      PREVIEW_URL: ${{ needs.wait-for-preview.outputs.preview_url }}
      UI_TEST_MODE: ${{ vars.UI_TEST_MODE || 'light' }}
      UI_TEST_MAX_TOKENS: ${{ vars.UI_TEST_MAX_TOKENS || '100000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for diff analysis

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tools
        run: |
          npm install -g @anthropic-ai/claude-code @browserbasehq/browse-cli

      - name: Install ui-test skill
        run: |
          # If the skill isn't already in the repo, install it
          if [ ! -d ".claude/skills/ui-test" ]; then
            npx skills add browserbase/ui-test
          fi

      - name: Run UI tests
        id: run-tests
        run: |
          chmod +x skills/ui-test/ci/run-ui-test.sh
          skills/ui-test/ci/run-ui-test.sh \
            --url "$PREVIEW_URL" \
            --mode "$UI_TEST_MODE" \
            --pr "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}"

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-report
          path: .context/ui-test-report.html
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-screenshots
          path: .context/ui-test-screenshots/
          if-no-files-found: ignore

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read the summary generated by the test run
            let summary = '';
            try {
              summary = fs.readFileSync('.context/ui-test-summary.md', 'utf8');
            } catch {
              summary = '⚠️ UI test run did not produce a summary. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.';
            }

            // Find and update existing comment, or create new one
            const marker = '<!-- ui-test-report -->';
            const body = `${marker}\n## UI Test Results\n\n${summary}\n\n📎 [Full HTML report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) (download artifact)\n\n---\n*Generated by [ui-test](https://github.com/browserbase/skills/tree/main/skills/ui-test) · Powered by [Browserbase](https://browserbase.com)*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.pull_request.number }},
                body,
              });
            }

      - name: Check pass rate
        if: always()
        run: |
          # Fail the check if pass rate is below threshold
          if [ -f .context/ui-test-exit-code ]; then
            exit $(cat .context/ui-test-exit-code)
          fi
