<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Antibot detection — www.nike.com</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #fafafa;
    color: #1c1c1c;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0d0d0f; color: #e8e8ea; }
    .card, header, .meta { background: #17171a; border-color: #2a2a2e; }
    .empty { background: #17171a; border-color: #2a2a2e; }
    a { color: #6aa9ff; }
  }
  main { max-width: 820px; margin: 40px auto; padding: 0 20px; }
  header {
    background: #fff;
    border: 1px solid #e6e6e8;
    border-radius: 14px;
    padding: 24px 28px;
    margin-bottom: 20px;
  }
  h1 { margin: 0 0 6px; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .url { word-break: break-all; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 13px; opacity: 0.85; }
  .meta {
    margin-top: 14px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 13px;
    color: #555;
  }
  @media (prefers-color-scheme: dark) { .meta { color: #aaa; } }
  .meta span b { font-weight: 600; color: inherit; }
  .grid { display: grid; gap: 12px; }
  .card {
    background: #fff;
    border: 1px solid #e6e6e8;
    border-left: 4px solid #888;
    border-radius: 12px;
    padding: 16px 20px;
  }
  .card-header { display: flex; align-items: center; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .name { font-weight: 600; font-size: 16px; }
  ul.ctx { margin: 10px 0 0; padding-left: 20px; font-size: 13px; opacity: 0.85; }
  ul.ctx li { font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .empty {
    background: #fff;
    border: 1px dashed #d4d4d6;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    color: #777;
  }
  footer { margin-top: 24px; font-size: 12px; opacity: 0.6; text-align: center; }
</style>
</head>
<body>
<main>
  <header>
    <h1>Antibot Detection Report</h1>
    <div class="url"><a href="https://www.nike.com/" target="_blank" rel="noreferrer">https://www.nike.com/</a></div>
    <div class="meta">
      <span><b>HTTP status:</b> 200</span>
      <span><b>Detected:</b> 2</span>
      <span><b>Generated:</b> 2026-05-06T00:25:08.546Z</span>
    </div>
  </header>
  <div class="grid">
    
          <div class="card" style="border-left-color:#0099cc">
            <div class="card-header">
              <span class="dot" style="background:#0099cc"></span>
              <span class="name">Akamai</span>
            </div>
            
          </div>
          <div class="card" style="border-left-color:#7d2bff">
            <div class="card-header">
              <span class="dot" style="background:#7d2bff"></span>
              <span class="name">Kasada</span>
            </div>
            
          </div>
  </div>
  <footer>Made with ❤️ at Browserbase</footer>
</main>
</body>
</html>
